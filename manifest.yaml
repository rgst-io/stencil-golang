# yaml-language-server: $schema=https://raw.githubusercontent.com/rgst-io/stencil/main/schemas/manifest.jsonschema.json
name: github.com/rgst-io/stencil-golang
type: templates,extension
postRunCommand:
  - name: mise install
    command: mise install
  - name: mise run fmt
    command: mise run fmt
arguments:
  vcs:
    description: |-
      VCS provider to use. "vcs_host" must be set when this is set to
      anything other than github.
    default: "github"
    schema:
      type: string
      default: "github"
      enum:
        - github
        - forgejo
  vcs_host:
    default: "github.com"
    description: |-
      URL of the VCS host to used. Currently only tested with Github
      compatible-ish VCS providers like Forgejo. Must be provided when
      vcs is set to anything other than Github.
    schema:
      type: string
      default: "github.com"
  org:
    description: The Github organization to use for the project
    required: true
    schema:
      type: string

  goos:
    description: Supported GOOS target(s)
    default: [linux, darwin, windows]
    schema:
      type: array
      items:
        type: string

  goarch:
    description: Supported GOARCH target(s)
    default: [amd64, arm64]
    schema:
      type: array
      items:
        type: string

  release_formats:
    description: |-
      Configures what release formats are available.

      Valid options:
      - binaries: Published to VCS releases offering
      - docker: Docker image published
    default:
      - binaries # Disabled if library is true
    schema:
      type: array
      items:
        type: string
        enum:
          - binaries
          - docker

  release_targets:
    description: |-
      Configures where releases and other published artifacts should go.
      This is meant to be set with a non-Github vcs.

      Valid options:
      - github: Publish to Github
      - vcs: Publish to other vcs provider, if vcs != github
    default:
      - github
      - vcs
    schema:
      type: array
      items:
        type: string
        enum:
          - github
          - vcs

  library:
    description: |-
      Whether the project is a library or not. If set to true, the
      project will be created as a library, meaning no commands will
      be created.
    schema:
      type: boolean

  copyrightHolder:
    description: |-
      The entity that holds the copyright for the
      project. Only applies if 'license' is set to Proprietary.
    schema:
      type: string
  license:
    default: GPL-3.0
    description: |-
      License to use for the project
    schema:
      type: string
      enum:
        - AGPL-3.0
        - Apache-2.0
        - MIT
        - GPL-3.0
        - LGPL-3.0
        - Proprietary

  commands:
    description: |-
      List of distinct entrypoints to create in this Golang
      application. If unset, defaults to the name of the project. When
      adding to this list, ensure that the project name is added if
      desired.
    schema:
      type: array
      items:
        type: string
